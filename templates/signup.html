<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaveFaste - Create Account</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif;}
body {background:#eef2f7; display:flex; justify-content:center; align-items:center; min-height:100vh; transition:0.4s;}
body.dark {background:#0f0f11;}
.signup-wrapper {width:95%; max-width:1150px; background:#fff; border-radius:20px; display:flex; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,0.12);}
body.dark .signup-wrapper {background:#18181c; box-shadow:0 20px 60px rgba(255,255,255,0.05);}
.signup-left {width:50%; padding:60px 45px; display:flex; flex-direction:column; justify-content:center;}
.signup-left h1 {text-align:center; font-size:38px; font-weight:800; color:#0066cc; margin-bottom:30px;}
body.dark .signup-left h1 { color:#48a3ff; }
.social-buttons {display:flex; flex-direction:column; gap:12px; margin-bottom:30px;}
.social-btn {padding:13px; border:none; border-radius:12px; font-size:15px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:14px; transition:.25s;}
.social-btn:hover { transform:scale(1.03); }
.social-btn svg { width:20px; height:20; }
.btn-google { background:#fff; border:1px solid #ddd; color:#444; }
.btn-facebook { background:#1877f2; color:white; }
.signup-form label { font-weight:600; margin-bottom:5px; display:block; color:#333; }
body.dark .signup-form label { color:#ddd; }
.signup-form input { width:100%; padding:15px; margin-bottom:18px; border-radius:12px; border:1px solid #ccc; font-size:15px; background:white; transition:.3s; }
.signup-form input:focus { border-color:#007bff; box-shadow:0 0 0 3px rgba(0,123,255,0.15); }
body.dark .signup-form input { background:#222; border-color:#444; color:#eee; }
.signup-form button { width:100%; padding:16px; background:#0066cc; color:white; border:none; border-radius:12px; font-size:17px; font-weight:700; cursor:pointer; transition:.25s; }
.signup-form button:hover { background:#0052a3; transform:translateY(-2px); }
.login-link, .terms { text-align:center; margin-top:15px; font-size:14px; }
body.dark .login-link, body.dark .terms { color:#aaa; }
.signup-right { width:50%; background:linear-gradient(135deg,#0066cc,#003f7f); color:white; padding:60px 35px; display:flex; flex-direction:column; justify-content:center; text-align:center; }
.signup-right h2 { font-size:32px; font-weight:800; margin-bottom:15px; }
.signup-right p { font-size:17px; opacity:.95; line-height:1.6; }
.signup-right img { margin-top:40px; width:100%; border-radius:14px; box-shadow:0 10px 25px rgba(0,0,0,0.25); }
.dark-btn { position:absolute; top:25px; right:30px; padding:10px 16px; border-radius:10px; background:#000; color:white; border:none; cursor:pointer; font-size:14px; font-weight:600; transition:.3s; }
.dark-btn:hover { opacity:0.8; }
@media(max-width:900px){ .signup-wrapper { flex-direction:column; } .signup-left, .signup-right { width:100%; } }
</style>
</head>
<body>

<button class="dark-btn" onclick="document.body.classList.toggle('dark')">🌙 / ☀️</button>

<div class="signup-wrapper">
  <div class="signup-left">
    <h1>SaveFaste</h1>

    <div class="social-buttons">
      <button class="social-btn btn-google" onclick="signInWithGoogle()">
        <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.23 9.21 3.66l6.85-6.85C35.89 2.46 30.32 0 24 0 14.66 0 6.41 5.73 2.64 14.03l7.98 6.19C12.45 13.02 17.77 9.5 24 9.5z"/><path fill="#34A853" d="M46.91 24.5c0-1.9-.19-3.72-.54-5.5H24v10.43h13.09c-.57 3-2.24 5.54-4.74 7.26l7.35 5.7C43.98 38.06 46.91 31.77 46.91 24.5z"/><path fill="#4A90E2" d="M10.62 28.16c-.5-1.5-.78-3.09-.78-4.66s.28-3.16.78-4.66l-7.98-6.19C2.23 15.59 1 19.68 1 24s1.23 8.41 3.64 11.35l7.98-6.19z"/><path fill="#FBBC05" d="M24 47c6.32 0 11.89-2.46 15.92-6.64l-7.35-5.7c-2.03 1.37-4.62 2.23-7.48 2.23-6.23 0-11.55-3.52-13.38-8.72l-7.98 6.19C6.41 42.27 14.66 47 24 47z"/></svg>
        Continue with Google
      </button>

      
    </div>

    <form id="signup-form" class="signup-form">
      <label>Name</label>
      <input type="text" id="name" placeholder="Your name" required>
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" required>
      <label>Password</label>
      <input type="password" id="password" placeholder="Create a password" required>
      <button type="submit">Create Account</button>
    </form>

    <div class="login-link">Already have an account? <a href="/login">Log in</a></div>
    <div class="terms">By continuing, you accept our Terms & Privacy Policy.</div>
  </div>

  <div class="signup-right">
    <h2>Tools that work for you</h2>
    <p>Convert, compress, merge and edit PDFs with SaveFaste — fast, modern and easy.</p>
    <img src="/static/ss.png" alt="">
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, FacebookAuthProvider, signInWithPopup, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyB8YY7HiPimpm_4E9pxUuID6DgZnl_WkAE",
  authDomain: "savefaste-6b548.firebaseapp.com",
  projectId: "savefaste-6b548",
  storageBucket: "savefaste-6b548.firebasestorage.app",
  messagingSenderId: "619367589434",
  appId: "1:619367589434:web:0546526637f19ab02af703",
  measurementId: "G-G11857WHKV"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Google SignIn
window.signInWithGoogle = function () {
  const provider = new GoogleAuthProvider();
  signInWithPopup(auth, provider)
    .then((result) => { window.location.href="/"; })
    .catch((error) => { alert(error.code); });
};

// Facebook SignIn
window.signInWithFacebook = function () {
  const provider = new FacebookAuthProvider();
  signInWithPopup(auth, provider)
    .then((result) => { window.location.href="/index"; })
    .catch((error) => { alert(error.code); });
};

// Email/Password Signup
const signupForm = document.getElementById("signup-form");
signupForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(userCredential.user, { displayName: name });
    window.location.href = "/";
  } catch (error) {
    alert(error.code + ": " + error.message);
  }
});
</script>

</body>
</html>
